<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Memory Game</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: linear-gradient(to right, #74ebd5, #acb6e5);
}

/* LEVEL PAGE */
#levelPage {
  margin-top: 50px;
}

button {
  margin: 10px;
  padding: 12px 25px;
  font-size: 16px;
  border: none;
  border-radius: 8px;
  background: #333;
  color: white;
  cursor: pointer;
}

button:hover {
  background: #555;
}

/* GAME */
#gameSection {
  display: none;
}

.game {
  display: grid;
  gap: 10px;
  justify-content: center;
  margin-top: 20px;
  perspective: 1000px;
}

/* CARD */
.card {
  width: 80px;
  height: 80px;
  position: relative;
  transform-style: preserve-3d;
  transition: transform 0.5s;
  cursor: pointer;
}

.card.flipped {
  transform: rotateY(180deg);
}

.card::before,
.card::after {
  position: absolute;
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 10px;
  font-size: 28px;
  backface-visibility: hidden;
}

.card::before {
  content: "?";
  background: #2c3e50;
  color: white;
}

.card::after {
  content: attr(data-symbol);
  background: #27ae60;
  transform: rotateY(180deg);
  color: white;
}

/* STATS */
.stats {
  margin-top: 10px;
  font-size: 18px;
}

/* POPUP */
#winPopup {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.7);
  display: none;
  justify-content: center;
  align-items: center;
}

.popup-content {
  background: white;
  padding: 30px;
  border-radius: 10px;
}
</style>

</head>
<body>

<h1>Memory Game</h1>

<!-- LEVEL -->
<div id="levelPage">
  <h2>Select Level</h2>
  <button onclick="setLevel('easy')">Easy</button>
  <button onclick="setLevel('medium')">Medium</button>
  <button onclick="setLevel('hard')">Hard</button>
</div>

<!-- GAME -->
<div id="gameSection">
  <div class="stats">
    Moves: <span id="moves">0</span> |
    Time: <span id="time">0</span>s
  </div>

  <div class="game" id="gameBoard"></div>

  <button onclick="goBack()">Back</button>
</div>

<!-- POPUP -->
<div id="winPopup">
  <div class="popup-content">
    <h2>🎉 You Won!</h2>
    <p id="finalScore"></p>
    <button onclick="closePopup()">Play Again</button>
  </div>
</div>

<script src="script.js"></script>

</body>
</html>
